# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: snippet-snap

before:
  hooks:
    - go mod tidy

builds:
  - id: snap
    main: .
    binary: snip
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: O-Aditya
    name: Snippet-snap
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

# ─── Homebrew Tap ───────────────────────────────
# Users install with: brew install O-Aditya/tap/snippet-snap
brews:
  - name: snippet-snap
    homepage: "https://github.com/O-Aditya/Snippet-snap"
    description: "Fast CLI for saving, searching, and reusing code snippets"
    license: "MIT"
    directory: Formula
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: O-Aditya
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GORELEASER_TOKEN }}"
    install: |
      bin.install "snip"
    test: |
      system "#{bin}/snip", "--help"

# ─── Scoop Bucket ───────────────────────────────
# Users install with: scoop bucket add snippet-snap https://github.com/O-Aditya/scoop-bucket
#                     scoop install snippet-snap
scoops:
  - name: snippet-snap
    homepage: "https://github.com/O-Aditya/Snippet-snap"
    description: "Fast CLI for saving, searching, and reusing code snippets"
    license: MIT
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: O-Aditya
      name: scoop-bucket
      branch: main
      token: "{{ .Env.GORELEASER_TOKEN }}"
